<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <script src="tracking.js" defer></script>
  <link rel="stylesheet" href="trackimg.css">
  
  <title>Frontend Mentor | Time tracking dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">

</head>
<body>
 <main class="main-container grid">

  <div class="main-card">
    <div class="avatar">
      <img src="images/image-jeremy.png" alt="avatar image of Jeremy Robson" class="avatar-image">

      <div class="avatar-info">
        <p class="light-text reporting">Report for</p>
      <p class="name">Jeremy Robinson</p>
    </div>  
    </div>
    <div class="periods flex">
      <p class="dark-text time-frame daily">Daily</p>
       <p class="dark-text time-frame weekly">Weekly</p>
        <p class="dark-text time-frame monthly">Monthly</p>
    </div>
  </div>
    <div class="card">
      <div class="image work-img"><img src="images/icon-work.svg" alt="work image">
      </div>
      <div class="content">
         <p class="category text-catagory"></p>
          <img src="images/icon-ellipsis.svg" alt="menue" class="dots">
             <p class="period"></p>
      <p class="previous-period"></p>
     
      </div>
    </div>
      <div class="card">
      <div class="image play-img"><img src="images/icon-play.svg" alt="play image">
        </div>
      <div class="content">
      <p class="category text-catagory"></p>
            <img src="images/icon-ellipsis.svg" alt="menue" class="dots">
      <p class="period"></p>
      <p class="previous-period"></p>
      </div>
      </div>
        <div class="card">
      <div class="image study-img"><img src="images/icon-study.svg" alt="study image">
        </div>
      <div class="content">
      <p class="category text-catagory"></p>
        <img src="images/icon-ellipsis.svg" alt="menue" class="dots">
      <p class="period"></p>
      <p class="previous-period"></p>
      </div>
        </div>
          <div class="card">
         <div class="image excer-img">
          <img src="images/icon-exercise.svg" alt="exerciseimage">
          </div>
      <div class="content">
      <p class="category text-catagory"></p>
       <img src="images/icon-ellipsis.svg" alt="menue" class="dots">
      <p class="period"></p>
      <p class="previous-period"></p>
      </div>
          </div>
            <div class="card">
       <div class="image social-img"><img src="images/icon-social.svg" alt="social image">
        </div>
      <div class="content">
      <p class="category text-catagory"></p>
            <img src="images/icon-ellipsis.svg" alt="menue" class="dots">
      <p class="period"></p>
      <p class="previous-period"></p>
      </div>
            </div>
              <div class="card">
      <div class="image self-care-img">
        <img src="images/icon-self-care.svg" alt="self care image">
        </div>
      <div class="content">
      <p class="category text-catagory"></p>
          <img src="images/icon-ellipsis.svg" alt="menue" class="dots">
      <p class="period"></p>
      <p class="previous-period"></p>
      </div>
              </div>


 </main>

  <!-- <footer class="attribution">

    Coded by <a href="#">Your Name Here</a>.
  </footer> -->
</body>
</html>
